<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Check - Mobile Gallery</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f0f0f0;
        }
        .debug-panel {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #333;
        }
        .status { padding: 5px; margin: 5px 0; }
        .ok { background: #90EE90; }
        .error { background: #FFB6C1; }
        .warning { background: #FFE4B5; }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Диагностика мобильной галереи</h1>

    <div class="debug-panel">
        <h2>Информация о странице</h2>
        <div id="info"></div>
    </div>

    <div class="debug-panel">
        <h2>Проверка элементов</h2>
        <div id="elements"></div>
    </div>

    <div class="debug-panel">
        <h2>Проверка CSS</h2>
        <div id="css"></div>
    </div>

    <div class="debug-panel">
        <h2>Проверка изображений</h2>
        <div id="images"></div>
    </div>

    <button onclick="runDiagnostics()">Запустить диагностику</button>
    <button onclick="window.location.href='index.html'">Открыть основную страницу</button>

    <script>
        function runDiagnostics() {
            const info = document.getElementById('info');
            const elements = document.getElementById('elements');
            const css = document.getElementById('css');
            const images = document.getElementById('images');

            // Clear previous results
            info.innerHTML = '';
            elements.innerHTML = '';
            css.innerHTML = '';
            images.innerHTML = '';

            // Basic info
            info.innerHTML = `
                <div class="status ok">Ширина окна: ${window.innerWidth}px</div>
                <div class="status ok">Высота окна: ${window.innerHeight}px</div>
                <div class="status ${window.innerWidth <= 992 ? 'ok' : 'warning'}">
                    Мобильный режим: ${window.innerWidth <= 992 ? 'ДА' : 'НЕТ'}
                </div>
            `;

            // Open index.html in iframe to check
            const iframe = document.createElement('iframe');
            iframe.src = 'index.html';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);

            iframe.onload = function() {
                const doc = iframe.contentDocument || iframe.contentWindow.document;

                // Check elements
                const grid = doc.querySelector('.before-after-grid');
                const cards = doc.querySelectorAll('.comparison-card');
                const dots = doc.querySelectorAll('.dot');

                elements.innerHTML = `
                    <div class="status ${grid ? 'ok' : 'error'}">
                        Grid найден: ${grid ? 'ДА' : 'НЕТ'}
                    </div>
                    <div class="status ${cards.length === 6 ? 'ok' : 'error'}">
                        Карточек найдено: ${cards.length} (ожидается 6)
                    </div>
                    <div class="status ${dots.length === 6 ? 'ok' : 'error'}">
                        Точек навигации: ${dots.length} (ожидается 6)
                    </div>
                `;

                // Check CSS
                if (grid) {
                    const gridStyles = window.getComputedStyle(grid);
                    const display = gridStyles.display;
                    const transform = gridStyles.transform;

                    css.innerHTML = `
                        <div class="status ${display === 'flex' ? 'ok' : 'warning'}">
                            Grid display: ${display} (на мобильном должен быть flex)
                        </div>
                        <div class="status ok">
                            Grid transform: ${transform}
                        </div>
                    `;

                    // Check each card
                    cards.forEach((card, i) => {
                        const cardStyles = window.getComputedStyle(card);
                        const width = cardStyles.width;
                        const minWidth = cardStyles.minWidth;
                        const position = cardStyles.position;

                        css.innerHTML += `
                            <div class="status ok">
                                Card ${i + 1}: width=${width}, minWidth=${minWidth}, position=${position}
                            </div>
                        `;
                    });
                }

                // Check images
                let imageChecks = '';
                cards.forEach((card, i) => {
                    const imgs = card.querySelectorAll('img');
                    imageChecks += `<div class="status ${imgs.length === 2 ? 'ok' : 'error'}">
                        Card ${i + 1}: ${imgs.length} изображений (ожидается 2)
                    </div>`;

                    imgs.forEach((img, j) => {
                        const loaded = img.complete && img.naturalHeight !== 0;
                        imageChecks += `<div class="status ${loaded ? 'ok' : 'error'}">
                            &nbsp;&nbsp;Image ${j + 1}: ${img.src.split('/').pop()} - ${loaded ? 'загружено' : 'НЕ загружено'}
                        </div>`;
                    });
                });
                images.innerHTML = imageChecks;

                // Remove iframe after check
                setTimeout(() => document.body.removeChild(iframe), 100);
            };
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(runDiagnostics, 500);
        });
    </script>
</body>
</html>
