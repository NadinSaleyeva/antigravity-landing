<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Gallery Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .before-after-wrapper {
            overflow: hidden;
            border: 2px solid red;
        }

        .before-after-grid {
            display: flex;
            overflow: hidden;
            gap: 0;
            transition: transform 0.4s ease;
        }

        .comparison-card {
            min-width: 100%;
            width: 100%;
            flex-shrink: 0;
            height: 300px;
            border-radius: 0;
            position: relative;
            overflow: hidden;
            background: #f0f0f0;
            border: 3px solid blue;
        }

        .comparison-card .comparison-img {
            position: absolute !important;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }

        .comparison-card .comparison-img img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            display: block !important;
        }

        .comparison-card .comparison-img.before {
            z-index: 2;
        }

        .comparison-card .comparison-img.after {
            z-index: 1;
        }

        .mobile-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }

        .info {
            margin-top: 20px;
            padding: 10px;
            background: #ffffcc;
        }
    </style>
</head>
<body>
    <h1>Mobile Gallery Debug Test</h1>
    <div class="info">
        <p>Current Index: <span id="currentIndex">0</span></p>
        <p>Total Cards: <span id="totalCards">0</span></p>
        <p>Transform: <span id="transform">none</span></p>
    </div>

    <div class="before-after-wrapper">
        <div class="before-after-grid" id="grid">
            <!-- Card 1 -->
            <div class="comparison-card" data-case="1">
                <div class="comparison-img after">
                    <img src="case1_before.webp" alt="Case 1 Before">
                </div>
                <div class="comparison-img before" style="clip-path: inset(0 50% 0 0);">
                    <img src="case1_after.webp" alt="Case 1 After">
                </div>
            </div>

            <!-- Card 2 -->
            <div class="comparison-card" data-case="2">
                <div class="comparison-img after">
                    <img src="case2_before.webp" alt="Case 2 Before">
                </div>
                <div class="comparison-img before" style="clip-path: inset(0 50% 0 0);">
                    <img src="case2_after.webp" alt="Case 2 After">
                </div>
            </div>

            <!-- Card 3 -->
            <div class="comparison-card" data-case="3">
                <div class="comparison-img after">
                    <img src="case3_before.webp" alt="Case 3 Before">
                </div>
                <div class="comparison-img before" style="clip-path: inset(0 50% 0 0);">
                    <img src="case3_after.webp" alt="Case 3 After">
                </div>
            </div>
        </div>
    </div>

    <div class="mobile-nav">
        <button id="prevBtn">← Prev</button>
        <button id="nextBtn">Next →</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const cards = document.querySelectorAll('.comparison-card');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let currentIndex = 0;
        const totalItems = cards.length;

        document.getElementById('totalCards').textContent = totalItems;

        function updateCarousel(index) {
            currentIndex = (index + totalItems) % totalItems;
            const offset = -currentIndex * 100;
            grid.style.transform = `translateX(${offset}%)`;

            document.getElementById('currentIndex').textContent = currentIndex;
            document.getElementById('transform').textContent = `translateX(${offset}%)`;

            console.log('Updated carousel:', { currentIndex, offset, totalItems });
        }

        prevBtn.addEventListener('click', () => updateCarousel(currentIndex - 1));
        nextBtn.addEventListener('click', () => updateCarousel(currentIndex + 1));

        // Initialize
        updateCarousel(0);

        console.log('Cards found:', cards.length);
        cards.forEach((card, i) => {
            console.log(`Card ${i}:`, card);
            const imgs = card.querySelectorAll('img');
            console.log(`  Images in card ${i}:`, imgs.length);
            imgs.forEach((img, j) => {
                console.log(`    Image ${j} src:`, img.src);
            });
        });
    </script>
</body>
</html>
